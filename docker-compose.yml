services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: docmem
      POSTGRES_PASSWORD: docmem
      POSTGRES_DB: docmem
    ports:
      - '5433:5432'
    volumes:
      - docmem-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U docmem']
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  docmem-pgdata:
